<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能伴侣 - 注册</title>
    <link rel="stylesheet" href="/static/css/register.css">
</head>
<body>
    <!-- 背景粒子动画 -->
    <div class="bg-animation">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- 注册卡片 -->
    <div class="register-container">
        <div class="register-card">
            <!-- Logo -->
            <div class="logo-wrapper">
                <div class="logo">
                    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="32" cy="32" r="30" stroke="url(#grad1)" stroke-width="2" fill="none"/>
                        <circle cx="32" cy="32" r="20" stroke="url(#grad1)" stroke-width="1.5" fill="none" opacity="0.6"/>
                        <circle cx="32" cy="32" r="10" stroke="url(#grad1)" stroke-width="1" fill="none" opacity="0.3"/>
                        <circle cx="32" cy="32" r="5" fill="url(#grad1)"/>
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#a78bfa"/>
                                <stop offset="100%" style="stop-color:#7c3aed"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
            </div>

            <!-- 标题 -->
            <h1 class="title">AI 智能伴侣</h1>

            <!-- 欢迎语 -->
            <p class="welcome">创建您的账号，开启智能对话之旅</p>

            <!-- 注册表单 -->
            <form id="registerForm" class="register-form" novalidate>
                <!-- 用户名 -->
                <div class="input-group">
                    <label for="username" class="input-label">用户名</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input
                            type="text"
                            id="username"
                            class="input-field"
                            placeholder="请输入用户名"
                            autocomplete="username"
                            required
                        >
                    </div>
                </div>

                <!-- 密码 -->
                <div class="input-group">
                    <label for="password" class="input-label">密码</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                            type="password"
                            id="password"
                            class="input-field"
                            placeholder="请输入密码（至少6位）"
                            autocomplete="new-password"
                            required
                        >
                        <button
                            type="button"
                            id="togglePassword"
                            class="toggle-password"
                            aria-label="显示密码"
                        >
                            <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- 确认密码 -->
                <div class="input-group">
                    <label for="confirmPassword" class="input-label">确认密码</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                            type="password"
                            id="confirmPassword"
                            class="input-field"
                            placeholder="请再次输入密码"
                            autocomplete="new-password"
                            required
                        >
                    </div>
                </div>

                <!-- 注册失败提示区域（默认隐藏） -->
                <div id="errorMessage" class="error-message" style="display: none;">
                    <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                    <span id="errorText"></span>
                </div>

                <!-- 注册成功提示区域（默认隐藏） -->
                <div id="successMessage" class="success-message" style="display: none;">
                    <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                    <span id="successText"></span>
                </div>

                <!-- 注册按钮 -->
                <button type="submit" id="registerBtn" class="btn btn-primary">
                    <span class="btn-text">注 册</span>
                </button>
            </form>

            <!-- 登录链接 -->
            <div class="login-link">
                <span class="login-text">已有账号？</span>
                <a href="/login" class="btn btn-outline">去登录</a>
            </div>
        </div>
    </div>

    <script src="/static/js/register.js"></script>
</body>
</html>
