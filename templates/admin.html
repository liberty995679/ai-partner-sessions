<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能伴侣 - 用户管理</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <!-- 背景粒子动画 -->
    <div class="bg-animation">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- 管理页面容器 -->
    <div class="admin-container">
        <div class="admin-card">
            <!-- Logo -->
            <div class="logo-wrapper">
                <div class="logo">
                    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="32" cy="32" r="30" stroke="url(#grad1)" stroke-width="2" fill="none"/>
                        <circle cx="32" cy="32" r="20" stroke="url(#grad1)" stroke-width="1.5" fill="none" opacity="0.6"/>
                        <circle cx="32" cy="32" r="10" stroke="url(#grad1)" stroke-width="1" fill="none" opacity="0.3"/>
                        <circle cx="32" cy="32" r="5" fill="url(#grad1)"/>
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#a78bfa"/>
                                <stop offset="100%" style="stop-color:#7c3aed"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
            </div>

            <!-- 标题 -->
            <h1 class="title">AI 智能伴侣</h1>
            <p class="subtitle">用户管理</p>

            <!-- 操作栏 -->
            <div class="toolbar">
                <span id="statsText" class="stats-text">加载中...</span>
                <div class="toolbar-actions">
                    <button id="refreshBtn" class="btn btn-outline">刷新列表</button>
                    <a href="/chat" class="btn btn-outline">返回聊天</a>
                </div>
            </div>

            <!-- 消息提示区域（默认隐藏） -->
            <div id="messageBox" class="message-box" style="display: none;">
                <svg class="msg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="messageText"></span>
            </div>

            <!-- 用户表格 -->
            <div class="table-wrapper">
                <table id="userTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>密码</th>
                            <th>创建时间</th>
                            <th class="th-action">操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr>
                            <td colspan="5" class="loading-cell">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/static/js/admin.js?v=1"></script>
</body>
</html>
